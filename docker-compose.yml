version: '3.9'

services:
  api_gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - engine

  engine:
    build: ./engine
    ports:
      - "8001:8001"
    depends_on:
      - bd
      - clasit
      - pixelado

  bd:
    build: ./bd
    ports:
      - "8002:8002"

  clasit:
    build: ./clasit
    ports:
      - "8003:8003"

  pixelado:
    build: ./pixelado
    ports:
      - "8004:8004"
